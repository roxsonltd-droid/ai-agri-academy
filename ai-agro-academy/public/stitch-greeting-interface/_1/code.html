<!DOCTYPE html>

<style>
        body { font-family: 'DM Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .yellow-pages-card {
            background: linear-gradient(135deg, #ffffff 0%, #fffcf0 100%);
            border-top: 4px solid #cea72c;
            box-shadow: 0 3px 0 rgba(0,0,0,0.12), 0 8px 24px rgba(201, 162, 39, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c0c9c2; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-[48px] max-w-container-max mx-auto bg-surface/96 backdrop-blur-md border-b border-outline-variant">
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm font-bold text-primary tracking-tight">Нова обява</h1>
</div>
<div class="flex items-center gap-3">
<span class="text-label-eyebrow font-label-eyebrow text-outline uppercase tracking-widest">Стъпка 1/3</span>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-[20px]">agriculture</span>
</div>
</div>
</header>
<!-- Content Canvas -->
<main class="pt-[64px] px-margin-mobile flex flex-col gap-6 max-w-container-max mx-auto">
<!-- Steps Indicator -->
<nav class="flex justify-between items-center py-4 px-2">
<div class="flex flex-col items-center gap-1 group">
<div class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold shadow-md transition-all group-active:scale-95">1</div>
<span class="text-label-badge font-label-badge text-primary">КАТЕГОРИЯ</span>
</div>
<div class="flex-1 h-[2px] mx-2 bg-outline-variant"></div>
<div class="flex flex-col items-center gap-1 opacity-50">
<div class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold">2</div>
<span class="text-label-badge font-label-badge text-on-surface-variant">ДЕТАЙЛИ</span>
</div>
<div class="flex-1 h-[2px] mx-2 bg-outline-variant"></div>
<div class="flex flex-col items-center gap-1 opacity-50">
<div class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold">3</div>
<span class="text-label-badge font-label-badge text-on-surface-variant">СНИМКИ</span>
</div>
</nav>
<!-- Category Selection -->
<section>
<h2 class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-3 px-1">Изберете категория</h2>
<div class="grid grid-cols-2 gap-3">
<button class="yellow-pages-card p-4 rounded-xl flex flex-col items-center gap-2 border border-outline-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-tertiary text-[32px]">grass</span>
<span class="font-bold text-body-sm text-primary">Зърно</span>
</button>
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-center gap-2 border border-transparent hover:border-outline-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-secondary text-[32px]">agriculture</span>
<span class="font-bold text-body-sm text-on-surface-variant">Техника</span>
</button>
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-center gap-2 border border-transparent hover:border-outline-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-secondary text-[32px]">handshake</span>
<span class="font-bold text-body-sm text-on-surface-variant">Услуги</span>
</button>
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-center gap-2 border border-transparent hover:border-outline-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-secondary text-[32px]">science</span>
<span class="font-bold text-body-sm text-on-surface-variant">Торове</span>
</button>
</div>
</section>
<!-- Main Form Fields -->
<section class="flex flex-col gap-5">
<div class="group">
<label class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-2 block px-1">Заглавие на обявата</label>
<input class="w-full h-[48px] bg-white border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-base" placeholder="Пример: Пшеница реколта 2023..." type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-2 block px-1">Цена (лв.)</label>
<div class="relative">
<input class="w-full h-[48px] bg-white border border-outline-variant rounded-lg px-4 pr-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-base" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant font-bold">BGN</span>
</div>
</div>
<div class="group">
<label class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-2 block px-1">Количество</label>
<div class="relative">
<input class="w-full h-[48px] bg-white border border-outline-variant rounded-lg px-4 pr-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-base" placeholder="100" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant font-bold">Тон</span>
</div>
</div>
</div>
<div class="group">
<label class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-2 block px-1">Местоположение</label>
<div class="relative">
<input class="w-full h-[48px] bg-white border border-outline-variant rounded-lg pl-10 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-base" placeholder="Град, Област" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">location_on</span>
</div>
</div>
</section>
<!-- Photo Upload Section -->
<section>
<label class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-3 block px-1">Снимки на продукта</label>
<div class="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
<div class="flex-shrink-0 w-32 h-32 rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-1 cursor-pointer hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary text-[32px]">add_a_photo</span>
<span class="text-label-badge font-label-badge text-primary">ДОБАВИ</span>
</div>
<div class="flex-shrink-0 w-32 h-32 rounded-xl overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="A detailed close-up of golden wheat grains held in a weathered farmer's hand, showcasing the texture and quality of the harvest. The lighting is warm and natural, emphasizing the organic agricultural theme. The background is a soft-focus view of a sun-drenched Bulgarian wheat field during the golden hour, creating a mood of productivity and trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDt8KZS34Xb9gOoePZcJkeG7cXRV4M5848PXj2x4faOI887qK50y4Rs4EQuqr2KEufOX1A-lc8GkPguGQnsNmb1uHEoNTGKgzzJaxV_xVb5qEmvwMkldjxCo6wTmIegsiB6txRXQXCv2O0dekzuET0Rhb4RLl_ttoUnQxCYdSWkX2Llo2uqR4Wkz1oH5myp3OmD0TVPw751RhoQFhmrmIMtMKmbvEYXvvqev8Hm6fv3cXc-kk5uhaozEQkroNaqQ5MoLFY7e4gMJEU"/>
<button class="absolute top-1 right-1 bg-error w-6 h-6 rounded-full flex items-center justify-center text-white shadow-md">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<div class="flex-shrink-0 w-32 h-32 rounded-xl overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="An expansive view of a lush green agricultural landscape in rural Bulgaria, featuring rolling hills and organized crop rows under a clear blue sky. The visual style is crisp and corporate-modern, utilizing a clean light-mode aesthetic. The lighting is bright and even, highlighting the efficiency and scale of modern farming operations." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpi6qoR-gUZHMfuKb2KLQOkZD2jt9Fs8XPwbVeSy54a9fkdkVe02OctELHweT3TUmwUGmjb9uJptsOu_bF7-7HU-xiZi1_jJBn7UYNSsHKzDxqvXiADP1WnxP4N5wZTECG_k5k27KjrJ5co2Tx_cemy172ei01BtmetOXdgz1cxAWJykd7E5FkCvHRFUt8zent1Tvs-0BbVfV1x3qQn7vrzCVcuZMoE_zKiW5M0p4HRYCPnjxQufSqBUG9SnCCWVa_1h-RbQVu-gk"/>
<button class="absolute top-1 right-1 bg-error w-6 h-6 rounded-full flex items-center justify-center text-white shadow-md">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
</div>
<p class="text-body-sm text-outline mt-2 px-1">Добавете до 10 снимки. Първата ще бъде основна.</p>
</section>
<!-- Description -->
<section class="mb-8">
<label class="text-label-eyebrow font-label-eyebrow text-outline uppercase mb-2 block px-1">Описание</label>
<textarea class="w-full bg-white border border-outline-variant rounded-lg p-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-base resize-none" placeholder="Опишете състоянието, начина на съхранение или допълнителни условия..." rows="4"></textarea>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-4 py-4 z-50">
<button class="w-full h-[52px] bg-primary text-on-primary rounded-full font-bold flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">publish</span>
<span>Публикувай обява</span>
</button>
</div>
<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('.active\\:scale-95').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.95)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Simple placeholder for step progression
        const steps = document.querySelectorAll('nav .flex-col');
        steps.forEach((step, index) => {
            step.addEventListener('click', () => {
                // Visual feedback only for demo
                console.log('Navigating to step', index + 1);
            });
        });
    </script>
</body></html>
