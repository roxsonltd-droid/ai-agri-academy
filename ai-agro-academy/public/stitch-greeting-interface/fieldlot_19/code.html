<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f0fdf2;
        }
        .yellow-page-card {
            background: linear-gradient(180deg, #ffffff 0%, #fffdf5 100%);
            border-top: 4px solid #cea72c;
            box-shadow: 0 3px 0 rgba(0,0,0,0.08);
            transition: all 0.2s ease;
        }
        .yellow-page-card:hover {
            box-shadow: 0 8px 24px rgba(201, 162, 39, 0.15);
            transform: translateY(-2px);
        }
        @keyframes slideInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-stagger > div {
            opacity: 0;
            animation: slideInUp 0.5s ease-out forwards;
        }
        .animate-stagger > div:nth-child(1) { animation-delay: 0.1s; }
        .animate-stagger > div:nth-child(2) { animation-delay: 0.2s; }
        .animate-stagger > div:nth-child(3) { animation-delay: 0.3s; }
        .animate-stagger > div:nth-child(4) { animation-delay: 0.4s; }
        .animate-stagger > div:nth-child(5) { animation-delay: 0.5s; }

        @keyframes badgePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 10px rgba(0, 54, 37, 0.4); }
            100% { transform: scale(1); }
        }
        .unread-badge-pulse {
            animation: badgePulse 2s infinite ease-in-out;
        }
    </style>

<script>
        // Simple micro-interaction for list items
        document.querySelectorAll('.cursor-pointer').forEach(item => {
            item.addEventListener('click', function() {
                this.classList.add('scale-[0.98]');
                setTimeout(() => {
                    this.classList.remove('scale-[0.98]');
                }, 100);
            });
        });

        // Search highlight effect
        const searchInput = document.querySelector('input');
        searchInput.addEventListener('focus', () => {
            searchInput.parentElement.classList.add('ring-2', 'ring-primary/10');
        });
        searchInput.addEventListener('blur', () => {
            searchInput.parentElement.classList.remove('ring-2', 'ring-primary/10');
        });
    </script>
