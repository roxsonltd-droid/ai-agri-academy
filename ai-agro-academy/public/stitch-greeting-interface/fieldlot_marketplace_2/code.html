        @keyframes staggerFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .listing-card { animation: staggerFadeIn 0.5s ease forwards; opacity: 0; }
        .listing-card:nth-child(1) { animation-delay: 0.1s; }
        .listing-card:nth-child(2) { animation-delay: 0.2s; }
        .listing-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-effect {
            background: linear-gradient(90deg, #f0fdf2 25%, #d9e6dc 50%, #f0fdf2 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;

<script>
        // Micro-interactions for scrolling effects
        let lastScrollY = window.scrollY;
        const header = document.querySelector('header');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm');
            } else {
                header.classList.remove('shadow-sm');
            }
            lastScrollY = window.scrollY;
        });

        // Add ripple effect logic (simulated for buttons)
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                this.classList.add('brightness-125');
                setTimeout(() => this.classList.remove('brightness-125'), 150);
            });
        });

        // Remove shimmer once images load
        window.addEventListener('load', () => {
            document.querySelectorAll('.shimmer-effect').forEach(shimmer => {
                const img = shimmer.querySelector('img');
                if (img && img.complete) {
                    shimmer.classList.remove('shimmer-effect');
                } else if (img) {
                    img.addEventListener('load', () => shimmer.classList.remove('shimmer-effect'));
                }
            });
        });
    </script>
