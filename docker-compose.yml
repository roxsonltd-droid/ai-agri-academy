services:
  postgres:
    image: postgres:16-alpine
    container_name: agro-academy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agro
      POSTGRES_PASSWORD: agro_dev_change_me
      POSTGRES_DB: agro_academy
    ports:
      - "5432:5432"
    volumes:
      - agro_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro -d agro_academy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agro_pg_data:
